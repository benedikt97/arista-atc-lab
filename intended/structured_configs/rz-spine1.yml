aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1
  description: P2P_rz-sdf-leaf1-1_Ethernet1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.201.8/31
  peer: rz-sdf-leaf1-1
  peer_interface: Ethernet1
  peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_rz-sdf-leaf1-2_Ethernet1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.201.12/31
  peer: rz-sdf-leaf1-2
  peer_interface: Ethernet1
  peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet3
  description: P2P_center-leaf2-1_Ethernet1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.202.16/31
  peer: center-leaf2-1
  peer_interface: Ethernet1
  peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet4
  description: P2P_center-leaf2-2_Ethernet1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.202.20/31
  peer: center-leaf2-2
  peer_interface: Ethernet1
  peer_type: l3leaf
  switchport:
    enabled: false
hostname: rz-spine1
ip_routing: true
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$KOB7dXerN/zU0qwP$AyKdyby06XyR3P0PQuHFXZNJrBRefN4UZU/C0xxp7eaYcsMIqII8knTPSQe3abzVzjwSpvtUL55AnE.i/pc/s/
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.1.1/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 172.22.0.101/24
  type: oob
  gateway: 172.22.0.1
metadata:
  is_deployed: true
  platform: cEOS-lab
  fabric_name: FABRIC
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.1.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65101'
  router_id: 10.255.1.1
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.201.9
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65103'
    peer: rz-sdf-leaf1-1
    description: rz-sdf-leaf1-1_Ethernet1
  - ip_address: 10.255.201.13
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65104'
    peer: rz-sdf-leaf1-2
    description: rz-sdf-leaf1-2_Ethernet1
  - ip_address: 10.255.202.17
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65105'
    peer: center-leaf2-1
    description: center-leaf2-1_Ethernet1
  - ip_address: 10.255.202.21
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65106'
    peer: center-leaf2-2
    description: center-leaf2-2_Ethernet1
  - ip_address: 10.255.1.5
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65105'
    peer: center-leaf2-1
    description: center-leaf2-1_Loopback0
  - ip_address: 10.255.1.6
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65106'
    peer: center-leaf2-2
    description: center-leaf2-2_Loopback0
  - ip_address: 10.255.1.3
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65103'
    peer: rz-sdf-leaf1-1
    description: rz-sdf-leaf1-1_Loopback0
  - ip_address: 10.255.1.4
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65104'
    peer: rz-sdf-leaf1-2
    description: rz-sdf-leaf1-2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: none
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.22.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: MGMT
  ip_routing: false
