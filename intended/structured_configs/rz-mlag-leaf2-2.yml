aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet3
  description: MLAG_rz-mlag-leaf2-1_Ethernet3
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: rz-mlag-leaf2-1
  peer_interface: Ethernet3
  peer_type: mlag_peer
- name: Ethernet4
  description: MLAG_rz-mlag-leaf2-1_Ethernet4
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: rz-mlag-leaf2-1
  peer_interface: Ethernet4
  peer_type: mlag_peer
- name: Ethernet1
  description: P2P_rz-spine2_Ethernet3
  shutdown: false
  mtu: 1500
  ipv6_address: 2001:db8:b2:5::2/64
  peer: rz-spine2
  peer_interface: Ethernet3
  peer_type: spine
  switchport:
    enabled: false
hostname: rz-mlag-leaf2-2
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 02:1c:73:00:00:99
ipv6_prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY-V6
  sequence_numbers:
  - sequence: 10
    action: permit 2001:db8:a1::/48 eq 64
  - sequence: 20
    action: permit 2001:db8:a2::/48 eq 64
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 2001:db8:c4:4::/64
ipv6_unicast_routing: true
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$KOB7dXerN/zU0qwP$AyKdyby06XyR3P0PQuHFXZNJrBRefN4UZU/C0xxp7eaYcsMIqII8knTPSQe3abzVzjwSpvtUL55AnE.i/pc/s/
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ipv6_address: 2001:db8:a1:6::1/64
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ipv6_address: 2001:db8:a2:5::1/64
- name: Loopback10
  description: DIAG_VRF_VRF4
  shutdown: false
  vrf: VRF4
  ip_address: 10.255.10.6/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 172.22.0.106/24
  type: oob
  gateway: 172.22.0.1
metadata:
  is_deployed: true
  platform: cEOS-lab
  fabric_name: FABRIC
mlag_configuration:
  domain_id: RZ-MLAG-LEAF2
  local_interface: Vlan4094
  peer_address: 2001:db8:c3:4::1
  peer_link: Port-Channel3
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel3
  description: MLAG_rz-mlag-leaf2-1_Port-Channel3
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 30
    type: permit
    match:
    - ipv6 address prefix-list PL-LOOPBACKS-EVPN-OVERLAY-V6
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65102'
  router_id: 10.255.1.6
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65102'
    description: rz-mlag-leaf2-1
    next_hop_self: true
    send_community: all
    maximum_routes: 12000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv6
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 2001:db8:c4:4::1
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: rz-mlag-leaf2-1
    description: rz-mlag-leaf2-1_Vlan4093
  - ip_address: 2001:db8:b2:5::1
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65102'
    peer: rz-spine2
    description: rz-spine2_Ethernet3
  - ip_address: 2001:db8:a1:2::1
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65102'
    peer: rz-spine2
    description: rz-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 11
    tenant: LABCOMPANY
    rd: 10.255.1.6:10011
    route_targets:
      both:
      - 10011:10011
    redistribute_routes:
    - learned
  - id: 12
    tenant: LABCOMPANY
    rd: 10.255.1.6:10012
    route_targets:
      both:
      - 10012:10012
    redistribute_routes:
    - learned
  - id: 3402
    tenant: LABCOMPANY
    rd: 10.255.1.6:13402
    route_targets:
      both:
      - 13402:13402
    redistribute_routes:
    - learned
  - id: 3401
    tenant: LABCOMPANY
    rd: 10.255.1.6:13401
    route_targets:
      both:
      - 13401:13401
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: false
  address_family_ipv6:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
  vrfs:
  - name: VRF4
    rd: 10.255.1.6:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
    router_id: 10.255.1.6
    updates:
      wait_install: true
    neighbors:
    - ip_address: 2001:db8:c4:4::1
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: rz-mlag-leaf2-1_Vlan3009
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 4096
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.22.0.1
transceiver_qsfp_default_mode_4x10: true
virtual_source_nat_vrfs:
- name: VRF4
  ip_address: 10.255.10.6
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ipv6_address: 2001:db8:c4:4::2/64
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ipv6_address: 2001:db8:c3:4::2/64
  mtu: 1500
  no_autostate: true
- name: Vlan11
  description: VRF10_VLAN11
  shutdown: false
  vrf: VRF4
  ip_address_virtual: 192.168.11.1/24
  ipv6_enable: true
  ipv6_address_virtuals:
  - 2001:DB8:D11::1/48
  tenant: LABCOMPANY
- name: Vlan12
  description: VRF10_VLAN12
  shutdown: false
  vrf: VRF4
  ip_address_virtual: 192.168.12.1/24
  ipv6_enable: true
  ipv6_address_virtuals:
  - 2001:DB8:D12::1/48
  tenant: LABCOMPANY
- name: Vlan3009
  description: MLAG_L3_VRF_VRF4
  shutdown: false
  vrf: VRF4
  ipv6_address: 2001:db8:c4:4::2/64
  mtu: 1500
  tenant: LABCOMPANY
  type: underlay_peering
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  tenant: system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  tenant: system
- id: 11
  name: VRF10_VLAN11
  tenant: LABCOMPANY
- id: 12
  name: VRF10_VLAN12
  tenant: LABCOMPANY
- id: 3009
  name: MLAG_L3_VRF_VRF4
  trunk_groups:
  - MLAG
  tenant: LABCOMPANY
- id: 3401
  name: SURVEILLANCE
  tenant: LABCOMPANY
- id: 3402
  name: PRINT
  tenant: LABCOMPANY
vrfs:
- name: MGMT
  ip_routing: false
- name: VRF4
  ip_routing: true
  ipv6_routing: true
  tenant: LABCOMPANY
vxlan_interface:
  vxlan1:
    description: rz-mlag-leaf2-2_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
      encapsulations:
        ipv6: true
      virtual_router_encapsulation_mac_address: mlag-system-id
      vlans:
      - id: 11
        vni: 10011
      - id: 12
        vni: 10012
      - id: 3401
        vni: 13401
      - id: 3402
        vni: 13402
      vrfs:
      - name: VRF4
        vni: 10
