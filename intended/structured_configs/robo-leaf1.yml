aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet3
  description: MLAG_robo-leaf2_Ethernet3
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: robo-leaf2
  peer_interface: Ethernet3
  peer_type: mlag_peer
- name: Ethernet4
  description: MLAG_robo-leaf2_Ethernet4
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: robo-leaf2
  peer_interface: Ethernet4
  peer_type: mlag_peer
hostname: robo-leaf1
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 02:1c:73:00:00:99
ipv6_prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY-V6
  sequence_numbers:
  - sequence: 10
    action: permit 2001:db8:a1::/48 eq 64
  - sequence: 20
    action: permit 2001:db8:a2::/48 eq 64
ipv6_unicast_routing: true
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$KOB7dXerN/zU0qwP$AyKdyby06XyR3P0PQuHFXZNJrBRefN4UZU/C0xxp7eaYcsMIqII8knTPSQe3abzVzjwSpvtUL55AnE.i/pc/s/
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ipv6_address: 2001:db8:a1:7::1/64
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ipv6_address: 2001:db8:a2:7::1/64
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 172.22.0.108/24
  type: oob
  gateway: 172.22.0.1
metadata:
  is_deployed: true
  platform: cEOS-lab
  fabric_name: FABRIC
mlag_configuration:
  domain_id: RZ-MLAG-LEAF2
  local_interface: Vlan4094
  peer_address: 2001:db8:3:6::2
  peer_link: Port-Channel3
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel3
  description: MLAG_robo-leaf2_Port-Channel3
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 30
    type: permit
    match:
    - ipv6 address prefix-list PL-LOOPBACKS-EVPN-OVERLAY-V6
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65102'
  router_id: 10.255.1.7
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65102'
    description: robo-leaf2
    next_hop_self: true
    send_community: all
    maximum_routes: 12000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv6
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 2001:db8:4:6::2
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: robo-leaf2
    description: robo-leaf2_Vlan4093
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: false
  address_family_ipv6:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 4096
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.22.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ipv6_address: 2001:db8:4:6::1/64
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ipv6_address: 2001:db8:3:6::1/64
  mtu: 1500
  no_autostate: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  tenant: system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  tenant: system
vrfs:
- name: MGMT
  ip_routing: false
vxlan_interface:
  vxlan1:
    description: robo-leaf1_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
      encapsulations:
        ipv6: true
      virtual_router_encapsulation_mac_address: mlag-system-id
