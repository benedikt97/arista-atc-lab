  shutdown: false
  vrf: VRF-CAM
  ip_address_virtual: 192.168.220.1/24
  ipv6_enable: true
  ipv6_address_virtuals:
  - 2001:DB8:D220::1/48
  tenant: ATC-FIDJI
- name: Vlan221
  description: VRFRDR_VLAN250_CAM_RDR
  shutdown: false
  vrf: VRF-CAM
  ip_address_virtual: 192.168.221.1/24
  ipv6_enable: true
  ipv6_address_virtuals:
  - 2001:DB8:D221::1/48
  tenant: ATC-FIDJI
- name: Vlan3011
