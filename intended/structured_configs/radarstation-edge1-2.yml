aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet3
  description: MLAG_radarstation-edge1-1_Ethernet3
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: radarstation-edge1-1
  peer_interface: Ethernet3
  peer_type: mlag_peer
- name: Ethernet4
  description: MLAG_radarstation-edge1-1_Ethernet4
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: radarstation-edge1-1
  peer_interface: Ethernet4
  peer_type: mlag_peer
- name: Ethernet1
  description: P2P_router_eth4
  shutdown: false
  mtu: 1500
  ip_address: 10.250.230.13/30
  peer: router
  peer_interface: eth4
  peer_type: other
  switchport:
    enabled: false
- name: Ethernet6
  description: SERVER_radar_eth2
  shutdown: false
  channel_group:
    id: 6
    mode: active
  peer: radar
  peer_interface: eth2
  peer_type: server
hostname: radarstation-edge1-2
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 02:1c:73:00:00:99
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$KOB7dXerN/zU0qwP$AyKdyby06XyR3P0PQuHFXZNJrBRefN4UZU/C0xxp7eaYcsMIqII8knTPSQe3abzVzjwSpvtUL55AnE.i/pc/s/
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.3.10/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.255.4.9/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 172.22.0.110/24
  type: oob
  gateway: 172.22.0.1
metadata:
  is_deployed: true
  platform: cEOS-lab
  fabric_name: FABRIC
mlag_configuration:
  domain_id: RADARSTATION-EDGE1
  local_interface: Vlan4094
  peer_address: 10.255.255.80
  peer_link: Port-Channel3
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel3
  description: MLAG_radarstation-edge1-1_Port-Channel3
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel6
  description: SERVER_radar_Bond0
  shutdown: false
  evpn_ethernet_segment:
    identifier: 0000:0000:0002:0001:0001
    route_target: 00:02:00:01:00:01
  lacp_id: 0002.0001.0001
  switchport:
    enabled: true
    mode: access
    access_vlan: 250
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.3.0/24 eq 32
  - sequence: 20
    action: permit 10.255.4.0/27 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.255.112/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65110'
  router_id: 10.255.3.10
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65110'
    description: radarstation-edge1-1
    next_hop_self: true
    send_community: all
    maximum_routes: 12000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  - name: EVPN-OVERLAY-CORE
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 15
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.255.112
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: radarstation-edge1-1
    description: radarstation-edge1-1_Vlan4093
  - ip_address: 10.255.1.4
    peer_group: EVPN-OVERLAY-CORE
    remote_as: '65104'
    peer: rz-sdf-leaf1-2
    description: rz-sdf-leaf1-2_Loopback0
  - ip_address: 10.250.230.14
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65202'
    peer: router
    description: router
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 220
    tenant: ATC-FIDJI
    rd: 10.255.3.10:10220
    rd_evpn_domain:
      domain: remote
      rd: 10.255.3.10:10220
    route_targets:
      both:
      - 10220:10220
      import_export_evpn_domains:
      - domain: remote
        route_target: 10220:10220
    redistribute_routes:
    - learned
  - id: 221
    tenant: ATC-FIDJI
    rd: 10.255.3.10:10221
    rd_evpn_domain:
      domain: remote
      rd: 10.255.3.10:10221
    route_targets:
      both:
      - 10221:10221
      import_export_evpn_domains:
      - domain: remote
        route_target: 10221:10221
    redistribute_routes:
    - learned
  - id: 250
    tenant: ATC-FIDJI
    rd: 10.255.3.10:10250
    rd_evpn_domain:
      domain: remote
      rd: 10.255.3.10:10250
    route_targets:
      both:
      - 10250:10250
      import_export_evpn_domains:
      - domain: remote
        route_target: 10250:10250
    redistribute_routes:
    - learned
  address_family_evpn:
    neighbor_default:
      next_hop_self_received_evpn_routes:
        enable: true
        inter_domain: true
    peer_groups:
    - name: EVPN-OVERLAY-CORE
      activate: true
      domain_remote: true
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
    - name: EVPN-OVERLAY-CORE
      activate: false
  vrfs:
  - name: VRF-CAM
    rd: 10.255.3.10:12
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '12:12'
      export:
      - address_family: evpn
        route_targets:
        - '12:12'
    router_id: 10.255.3.10
    updates:
      wait_install: true
    neighbors:
    - ip_address: 10.255.255.112
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: radarstation-edge1-1_Vlan3011
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
  - name: VRF-RDR
    rd: 10.255.3.10:11
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '11:11'
      export:
      - address_family: evpn
        route_targets:
        - '11:11'
    router_id: 10.255.3.10
    updates:
      wait_install: true
    neighbors:
    - ip_address: 10.255.255.112
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: radarstation-edge1-1_Vlan3010
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 4096
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.22.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 10.255.255.113/31
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 10.255.255.81/31
  mtu: 1500
  no_autostate: true
- name: Vlan220
