  shutdown: false
  vrf: VRF-RDR
  ip_address_virtual: 192.168.250.1/24
  ipv6_enable: true
  ipv6_address_virtuals:
  - 2001:DB8:D250::1/48
  tenant: ATC-FIDJI
- name: Vlan3010
  description: MLAG_L3_VRF_VRF-RDR
  shutdown: false
  vrf: VRF-RDR
  ip_address: 10.255.255.113/31
  mtu: 1500
  tenant: ATC-FIDJI
  type: underlay_peering
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  tenant: system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  tenant: system
- id: 220
  name: VRFRDR_VLAN220_CAM_TOWER
  tenant: ATC-FIDJI
- id: 221
  name: VRFRDR_VLAN250_CAM_RDR
  tenant: ATC-FIDJI
- id: 3011
  name: MLAG_L3_VRF_VRF-CAM
  trunk_groups:
  - MLAG
  tenant: ATC-FIDJI
- id: 250
  name: VRFRDR_VLAN250_RDR
  tenant: ATC-FIDJI
- id: 3010
