    remote_as: '65101'
    metadata:
      peer: rz-spine1
    description: rz-spine1_Ethernet4
  - ip_address: 10.255.202.22
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: rz-spine2
    description: rz-spine2_Ethernet4
  - ip_address: 10.255.1.1
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: rz-spine1
    description: rz-spine1_Loopback0
  - ip_address: 10.255.1.2
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: rz-spine2
    description: rz-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
