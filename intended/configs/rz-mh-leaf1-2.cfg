!
no enable password
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$KOB7dXerN/zU0qwP$AyKdyby06XyR3P0PQuHFXZNJrBRefN4UZU/C0xxp7eaYcsMIqII8knTPSQe3abzVzjwSpvtUL55AnE.i/pc/s/
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname rz-mh-leaf1-2
!
spanning-tree mode mstp
spanning-tree mst 0 priority 4096
!
vlan 11
   name VRF10_VLAN11
!
vlan 12
   name VRF10_VLAN12
!
vlan 3401
   name SURVEILLANCE
!
vlan 3402
   name PRINT
!
vrf instance MGMT
!
vrf instance VRF4
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf MGMT
      no shutdown
!
interface Ethernet1
   description P2P_rz-spine1_Ethernet2
   no shutdown
   mtu 1500
   no switchport
   ipv6 address 2001:db8:b4:6::2/64
!
interface Ethernet2
   description P2P_rz-spine2_Ethernet2
   no shutdown
   mtu 1500
   no switchport
   ipv6 address 2001:db8:b4:7::2/64
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ipv6 address 2001:db8:a1:4::1/64
!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   no shutdown
   ipv6 address 2001:db8:a2:4::1/64
!
interface Loopback10
   description DIAG_VRF_VRF4
   no shutdown
   vrf VRF4
   ip address 10.255.10.4/32
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 172.22.0.104/24
!
interface Vlan11
   description VRF10_VLAN11
   no shutdown
   vrf VRF4
   ipv6 enable
   ip address virtual 192.168.11.1/24
   ipv6 address virtual 2001:DB8:D11::1/48
!
interface Vlan12
   description VRF10_VLAN12
   no shutdown
   vrf VRF4
   ipv6 enable
   ip address virtual 192.168.12.1/24
   ipv6 address virtual 2001:DB8:D12::1/48
!
interface Vxlan1
   description rz-mh-leaf1-2_VTEP
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan encapsulation ipv6
   vxlan vlan 11 vni 10011
   vxlan vlan 12 vni 10012
   vxlan vlan 3401 vni 13401
   vxlan vlan 3402 vni 13402
   vxlan vrf VRF4 vni 10
!
ip virtual-router mac-address 02:1c:73:00:00:99
!
ip address virtual source-nat vrf VRF4 address 10.255.10.4
!
ip routing
no ip routing vrf MGMT
ip routing vrf VRF4
!
ipv6 prefix-list PL-LOOPBACKS-EVPN-OVERLAY-V6
   seq 10 permit 2001:db8:a1::/48 eq 64
   seq 20 permit 2001:db8:a2::/48 eq 64
!
ipv6 unicast-routing
ipv6 unicast-routing vrf VRF4
!
ip route vrf MGMT 0.0.0.0/0 172.22.0.1
!
route-map RM-CONN-2-BGP permit 30
   match ipv6 address prefix-list PL-LOOPBACKS-EVPN-OVERLAY-V6
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65104
   router-id 10.255.1.4
   no bgp default ipv4-unicast
   maximum-paths 4 ecmp 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 12000
   neighbor 2001:db8:a1:1::1 peer group EVPN-OVERLAY-PEERS
   neighbor 2001:db8:a1:1::1 remote-as 65101
   neighbor 2001:db8:a1:1::1 description rz-spine1_Loopback0
   neighbor 2001:db8:a1:2::1 peer group EVPN-OVERLAY-PEERS
   neighbor 2001:db8:a1:2::1 remote-as 65102
   neighbor 2001:db8:a1:2::1 description rz-spine2_Loopback0
   neighbor 2001:db8:b4:6::1 peer group IPv4-UNDERLAY-PEERS
   neighbor 2001:db8:b4:6::1 remote-as 65101
   neighbor 2001:db8:b4:6::1 description rz-spine1_Ethernet2
   neighbor 2001:db8:b4:7::1 peer group IPv4-UNDERLAY-PEERS
   neighbor 2001:db8:b4:7::1 remote-as 65102
   neighbor 2001:db8:b4:7::1 description rz-spine2_Ethernet2
   redistribute connected route-map RM-CONN-2-BGP
   !
   vlan 11
      rd 10.255.1.4:10011
      route-target both 10011:10011
      redistribute learned
   !
   vlan 12
      rd 10.255.1.4:10012
      route-target both 10012:10012
      redistribute learned
   !
   vlan 3401
      rd 10.255.1.4:13401
      route-target both 13401:13401
      redistribute learned
   !
   vlan 3402
      rd 10.255.1.4:13402
      route-target both 13402:13402
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv6
      neighbor IPv4-UNDERLAY-PEERS activate
   !
   vrf VRF4
      rd 10.255.1.4:10
      route-target import evpn 10:10
      route-target export evpn 10:10
      router-id 10.255.1.4
      redistribute connected
!
end
