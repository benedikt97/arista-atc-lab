!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 172.22.0.108/24
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1500
   no autostate
   ip address 10.255.255.77/31
no ip routing vrf MGMT
!
mlag configuration
   domain-id TOWER-LEAF3
   local-interface Vlan4094
