vlan 10
   name VRF-EXT_VLAN11_EXT
!
vlan 11
   name VRF-EXT_VLAN11_CLIENT
!
vlan 12
   name VRF-EXT_VLAN12_SERVER
!
vlan 219
   name VRF-CAM_VLAN219_REC
!
vlan 220
   name VRF-CAM_VLAN220_CAM_TOWER
!
vlan 250
   name VRF-RDR_VLAN250_RDR
!
vlan 3401
   name CHANNEL-A
!
vlan 3402
   name CHANNEL-B
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance MGMT
!
management api http-commands
   protocol https
   protocol http
   no shutdown
   !
   vrf MGMT
      no shutdown
!
interface Port-Channel3
   description MLAG_tower-leaf3-1_Port-Channel3
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Port-Channel5
   description SERVER_tower-position1_Bond0
