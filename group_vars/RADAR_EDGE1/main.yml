---
type: l3leaf

l3leaf:
  defaults:
    platform: cEOS-lab
    router_id_pool: 10.255.1.0/24
    loopback_ipv6_pool: 2001:DB8:A1::/48
    vtep_loopback_ipv6_pool: 2001:DB8:A2::/48
#    uplink_switches: ['rz-spine1', 'rz-spine2']
    uplink_ipv6_pool: 2001:DB8:B5::/48
#    mlag_peer_address_family: ipv6
    mlag_peer_ipv6_pool: 2001:DB8:3::/48
    mlag_peer_l3_ipv6_pool: 2001:DB8:4::/48
    virtual_router_mac_address: 02:1c:73:00:00:99
    spanning_tree_priority: 4096
    spanning_tree_mode: mstp
    loopback_ipv4_pool: 10.255.3.0/24
    vtep_loopback_ipv4_pool: 10.255.4.0/27
    uplink_ipv4_pool: 10.255.204.0/26
    mlag_peer_ipv4_pool: 10.255.255.64/27
    mlag_peer_l3_ipv4_pool: 10.255.255.96/27
    evpn_gateway:
      evpn_l2:
        enabled: true
      evpn_l3:
        enabled: true
        inter_domain: true




  node_groups:
    - group: RADARSTATION-EDGE1
      nodes:
        - name: radar-edge1-1
          id: 9
          mgmt_ip: 172.22.0.109/24
          bgp_as: 65109
          uplink_ipv6_pool: 2001:DB8:B5::/48
          evpn_gateway:
            remote_peers:
              - hostname: rz-leaf1-1
                ip_address: 10.255.1.3
                bgp_as: 65103
              - hostname: rz-leaf1-2
                ip_address: 10.255.1.4
                bgp_as: 65103



        - name: radar-edge1-2
          id: 10
          mgmt_ip: 172.22.0.110/24
          bgp_as: 65109
          uplink_ipv6_pool: 2001:DB8:B6::/48
          evpn_gateway:
            remote_peers:
              - hostname: rz-leaf1-2
                ip_address: 10.255.1.4
                bgp_as: 65103
              - hostname: rz-leaf1-1
                ip_address: 10.255.1.3
                bgp_as: 65103
          


l3_edge:
  p2p_links:
    - ip: [ 10.250.230.9/30, 10.250.230.10/30 ]
      nodes: [ radar-edge1-1, router ]
      interfaces: [ Ethernet1, eth3 ]
      include_in_underlay_protocol: true
      as: [ 65109, 65202 ]
      ipv6_enable: true 
    - ip: [ 10.250.230.13/30, 10.250.230.14/30 ]
      nodes: [ radar-edge1-2, router ]
      interfaces: [ Ethernet1, eth4 ]
      include_in_underlay_protocol: true
      as: [ 65110, 65202 ]
